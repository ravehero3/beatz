kind = "web"
previewPath = "/"
title = "Beatpack"
version = "1.0.0"
id = "artifacts/beatpack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18143

[services.development]
run = "pnpm --filter @workspace/beatpack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/beatpack", "run", "build" ]
publicDir = "artifacts/beatpack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18143"
BASE_PATH = "/"
