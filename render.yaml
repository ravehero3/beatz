services:
  - type: web
    name: beatpack
    env: node
    buildCommand: npm install -g pnpm@10 && pnpm install && pnpm run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
