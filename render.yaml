services:
  - type: web
    name: beatpack
    env: node
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    preDeployCommand: pnpm --filter @workspace/db run push-force
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: ENABLE_COREPACK
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
